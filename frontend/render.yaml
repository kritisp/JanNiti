services:
  # 1. Backend API Service (FastAPI)
  - type: web
    name: janvikas-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: janvikas-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: true
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://janvikas-frontend.onrender.com

  # 2. Frontend Static Site Service (Vite React Router App)
  - type: web
    name: janvikas-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: janvikas-backend
          property: host

# 3. Managed PostgreSQL Database
databases:
  - name: janvikas-db
    plan: free
    databaseName: janvikas_db
    user: janvikas_admin
